<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>hermes</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: #0d1117;
        color: #c9d1d9;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        overflow: hidden;
      }
      body {
        display: flex;
        flex-direction: column;
        height: 100dvh;
      }
      #term {
        flex: 1;
        min-height: 0;
        padding: 0.5rem;
      }
      .xterm, .xterm-viewport, .xterm-screen { height: 100% !important; }
      #tabs {
        display: flex;
        gap: 0.25rem;
        padding: 0.4rem 0.5rem;
        background: #161b22;
        border-bottom: 1px solid #30363d;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        align-items: center;
      }
      .tab {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.4rem 0.6rem 0.4rem 0.75rem;
        background: #21262d;
        color: #c9d1d9;
        border: 1px solid #30363d;
        border-radius: 6px;
        font-family: inherit;
        font-size: 0.8rem;
        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        white-space: nowrap;
      }
      .tab:active { background: #30363d; }
      .tab.active {
        background: #1f6feb;
        border-color: #1f6feb;
        color: #fff;
      }
      .tab .x {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.25rem;
        height: 1.25rem;
        border-radius: 4px;
        font-size: 1rem;
        line-height: 1;
        color: #8b949e;
      }
      .tab .x:hover { background: rgba(248, 81, 73, 0.2); color: #f85149; }
      .tab.active .x { color: rgba(255,255,255,0.7); }
      .tab.active .x:hover { background: rgba(255,255,255,0.15); color: #fff; }
      .tab-add-group {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: stretch;
        border: 1px dashed #30363d;
        border-radius: 6px;
        overflow: hidden;
      }
      .tab-add-group:hover { border-color: #58a6ff; }
      .tab-add-group:focus-within { border-color: #58a6ff; }
      #tab-add, #tab-add-profile {
        background: transparent;
        color: #8b949e;
        border: none;
        font-family: inherit;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        padding: 0.4rem 0.7rem;
      }
      #tab-add { font-size: 0.95rem; }
      .tab-add-group:hover #tab-add,
      .tab-add-group:hover #tab-add-profile { color: #c9d1d9; }
      #tab-add-profile {
        font-size: 0.7rem;
        padding: 0.4rem 0.4rem;
        border-left: 1px dashed #30363d;
        appearance: none;
        -webkit-appearance: none;
        text-align: center;
        text-align-last: center;
      }
      #tab-add-profile:focus { outline: none; }
      #tab-add[disabled], #tab-add-profile[disabled] { opacity: 0.5; cursor: progress; }
      #toolbar {
        display: flex;
        gap: 0.35rem;
        padding: 0.5rem;
        background: #161b22;
        border-top: 1px solid #30363d;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      #toolbar button {
        flex: 0 0 auto;
        min-width: 3rem;
        padding: 0.6rem 0.75rem;
        background: #21262d;
        color: #c9d1d9;
        border: 1px solid #30363d;
        border-radius: 6px;
        font-family: inherit;
        font-size: 0.85rem;
        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #toolbar button:active { background: #30363d; }
      #toolbar button.sticky-on {
        background: #1f6feb;
        border-color: #1f6feb;
        color: #fff;
      }
      #status {
        position: fixed;
        top: 0.5rem;
        right: 0.5rem;
        font-size: 0.75rem;
        padding: 0.25rem 0.5rem;
        background: rgba(0,0,0,0.6);
        border-radius: 4px;
        color: #8b949e;
        pointer-events: none;
      }
      #status.connected { color: #3fb950; }
      #status.disconnected { color: #f85149; }
    </style>
  </head>
  <body>
    <div id="tabs">
      <div class="tab-add-group" id="tab-add-group">
        <button id="tab-add" title="new session">+</button>
        <select id="tab-add-profile" title="new session: pick a hermes profile or shortcut">
          <option value="" selected disabled>⌄</option>
        </select>
      </div>
    </div>
    <div id="term"></div>
    <div id="toolbar">
      <button data-key="Escape">esc</button>
      <button data-key="Tab">tab</button>
      <button data-ctrl="true" id="btn-ctrl">ctrl</button>
      <button data-key="ArrowUp">↑</button>
      <button data-key="ArrowDown">↓</button>
      <button data-key="ArrowLeft">←</button>
      <button data-key="ArrowRight">→</button>
      <button data-send="">^C</button>
      <button data-send="">^D</button>
      <button id="btn-paste">paste</button>
    </div>
    <div id="status">connecting…</div>
    <script type="module" src="./terminal.ts"></script>
  </body>
</html>
